<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mish Mish OS — Infrastructure Calibration</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #131314; color: #e3e3e3; overflow: hidden; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3c4043; border-radius: 99px; }
  .modal-overlay { background-color: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
  input[type="range"] { height: 4px; -webkit-appearance: none; background: #3c4043; border-radius: 2px; }
  input[type="range"]:focus { outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #a855f7; cursor: pointer; }
</style>
</head>
<body class="h-screen w-screen flex">

  <!-- PERMANENT SIDEBAR (always visible) -->
  <aside class="w-80 bg-[#1e1f20] border-r border-[#3c4043] flex flex-col flex-shrink-0 overflow-y-auto">
    <div class="p-4 border-b border-[#3c4043] flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-purple-600 to-indigo-500 flex items-center justify-center font-bold text-white text-sm">M</div>
      <span class="font-bold text-[#e3e3e3] text-sm">Mish Mish OS</span>
      <span class="text-[9px] bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded-full ml-auto">v2.0</span>
    </div>

    <div class="p-4 space-y-5 flex-1">
      <!-- GitHub Configuration -->
      <div>
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1"><i data-lucide="github" class="w-3 h-3"></i> GitHub Token</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxx (repo scope)" class="w-full mt-1 bg-[#131314] border border-[#3c4043] rounded-xl px-3 py-2 text-xs text-white outline-none focus:border-purple-500">
      </div>
      <div>
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Repository (owner/repo)</label>
        <input type="text" id="ghRepo" placeholder="username/repository-name" class="w-full mt-1 bg-[#131314] border border-[#3c4043] rounded-xl px-3 py-2 text-xs text-white outline-none focus:border-purple-500">
      </div>
      <div>
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1"><i data-lucide="key" class="w-3 h-3"></i> Gemini API Key</label>
        <input type="password" id="geminiKey" placeholder="Your Gemini API key" class="w-full mt-1 bg-[#131314] border border-[#3c4043] rounded-xl px-3 py-2 text-xs text-white outline-none focus:border-purple-500">
      </div>
      <div>
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Gemini Model</label>
        <select id="geminiModel" class="w-full mt-1 bg-[#131314] border border-[#3c4043] rounded-xl px-3 py-2 text-xs text-white">
          <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
        </select>
      </div>
      <button onclick="saveAndHandshake()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold text-xs py-2 rounded-xl transition flex items-center justify-center gap-2"><i data-lucide="plug" class="w-3 h-3"></i> Connect & Validate</button>

      <div class="h-px bg-[#3c4043] my-2"></div>

      <!-- Dynamic Persona Adjustment -->
      <div>
        <div class="flex justify-between items-center">
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">🎭 Creativity (Temperature)</label>
          <span id="tempValue" class="text-[10px] font-mono text-purple-300">0.7</span>
        </div>
        <input type="range" id="tempSlider" min="0" max="1" step="0.05" value="0.7" class="w-full mt-1">
      </div>
      <div>
        <div class="flex justify-between items-center">
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">📝 Verbosity (Top P)</label>
          <span id="topPValue" class="text-[10px] font-mono text-purple-300">0.9</span>
        </div>
        <input type="range" id="topPSlider" min="0" max="1" step="0.05" value="0.9" class="w-full mt-1">
      </div>
      <div>
        <div class="flex justify-between items-center">
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">⚡ Risk Taking (Top K)</label>
          <span id="topKValue" class="text-[10px] font-mono text-purple-300">40</span>
        </div>
        <input type="range" id="topKSlider" min="1" max="100" step="1" value="40" class="w-full mt-1">
      </div>
      <div class="flex items-center justify-between">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">🤖 System Role</label>
        <select id="personaPreset" class="bg-[#131314] border border-[#3c4043] rounded-lg px-2 py-1 text-[10px] text-white">
          <option value="Hisham Al Ansari (ADHD Performance Director)">Hisham (Default)</option>
          <option value="Analytical Strategist">Analytical Strategist</option>
          <option value="Creative Explainer">Creative Explainer</option>
        </select>
      </div>

      <div class="h-px bg-[#3c4043] my-2"></div>
      <div>
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">📊 Active Milestone</label>
        <div class="bg-[#131314] rounded-xl p-2 mt-1">
          <div class="flex justify-between text-[10px]"><span class="text-gray-400">Target</span><span id="sidebarGoal" class="text-white font-medium">3 client bookings</span></div>
          <div class="w-full bg-[#2f3032] h-1.5 rounded-full mt-1 overflow-hidden"><div id="goalProgressBar" class="bg-purple-500 h-full w-[70%]"></div></div>
        </div>
      </div>
    </div>
    <div class="p-3 border-t border-[#3c4043] bg-[#131314] text-center text-[9px] text-gray-500 font-mono">Mish Mish OS — Infrastructure Calibration</div>
  </aside>

  <!-- MAIN CONTENT AREA -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="h-14 border-b border-[#3c4043] bg-[#1e1f20] px-4 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-2 text-[10px] bg-[#131314] px-3 py-1 rounded-full">
          <span class="text-gray-400">GitHub:</span>
          <span id="githubStatusDot" class="w-2 h-2 rounded-full bg-rose-500"></span>
          <span id="githubStatusLabel" class="font-mono text-gray-300">Offline</span>
        </div>
        <div class="flex items-center gap-2 text-[10px] bg-[#131314] px-3 py-1 rounded-full">
          <span class="text-gray-400">Gemini:</span>
          <span id="apiStatusDot" class="w-2 h-2 rounded-full bg-rose-500"></span>
          <span id="apiStatusLabel" class="font-mono text-gray-300">Offline</span>
        </div>
      </div>
    </header>

    <!-- Tab Navigation -->
    <div class="bg-[#1e1f20] border-b border-[#3c4043] px-4 flex gap-1 overflow-x-auto flex-shrink-0">
      <button onclick="switchTab('showrunner')" class="tab-btn px-4 py-2 text-xs font-semibold text-gray-400 hover:text-white border-b-2 border-transparent transition flex items-center gap-1.5" data-tab="showrunner"><i data-lucide="terminal" class="w-3.5 h-3.5"></i> Showrunner</button>
      <button onclick="switchTab('content')" class="tab-btn px-4 py-2 text-xs font-semibold text-gray-400 hover:text-white border-b-2 border-transparent transition flex items-center gap-1.5" data-tab="content"><i data-lucide="pen-tool" class="w-3.5 h-3.5"></i> Content</button>
      <button onclick="switchTab('design')" class="tab-btn px-4 py-2 text-xs font-semibold text-gray-400 hover:text-white border-b-2 border-transparent transition flex items-center gap-1.5" data-tab="design"><i data-lucide="paintbrush" class="w-3.5 h-3.5"></i> Design</button>
      <button onclick="switchTab('files')" class="tab-btn px-4 py-2 text-xs font-semibold text-gray-400 hover:text-white border-b-2 border-transparent transition flex items-center gap-1.5" data-tab="files"><i data-lucide="folder" class="w-3.5 h-3.5"></i> Files</button>
    </div>

    <!-- Tab Panels -->
    <div class="flex-1 overflow-hidden relative bg-[#131314]">
      <!-- Showrunner Panel -->
      <div id="panel-showrunner" class="panel absolute inset-0 flex flex-col p-4 overflow-y-auto gap-3">
        <div id="srChat" class="flex-1 space-y-3 overflow-y-auto"></div>
        <div class="flex gap-2 mt-2">
          <input type="text" id="srInput" placeholder="Direct the Showrunner..." class="flex-1 bg-[#1e1f20] border border-[#3c4043] rounded-full px-4 py-2 text-xs text-white focus:outline-none focus:border-purple-500" onkeydown="if(event.key==='Enter') sendShowrunner()">
          <button onclick="sendShowrunner()" class="bg-purple-600 hover:bg-purple-500 text-white rounded-full p-2"><i data-lucide="arrow-up" class="w-4 h-4"></i></button>
        </div>
      </div>

      <!-- Content Panel -->
      <div id="panel-content" class="panel absolute inset-0 hidden flex-col p-4 overflow-y-auto gap-4">
        <div class="flex justify-between items-center"><h3 class="text-xs font-bold text-gray-400">Content Engine</h3><span id="creativeRoleIndicator" class="text-[9px] mono bg-purple-500/10 text-purple-300 px-2 py-0.5 rounded-full">HOOK</span></div>
        <div class="flex gap-2">
          <button onclick="setRole('hook', this)" class="role-btn text-[10px] font-bold px-3 py-1.5 rounded-lg bg-purple-500/20 text-purple-300">HOOK</button>
          <button onclick="setRole('narrative', this)" class="role-btn text-[10px] font-bold px-3 py-1.5 rounded-lg border border-[#3c4043] text-gray-400">STORY</button>
          <button onclick="setRole('offer', this)" class="role-btn text-[10px] font-bold px-3 py-1.5 rounded-lg border border-[#3c4043] text-gray-400">OFFER</button>
        </div>
        <textarea id="cfInput" class="bg-[#131314] border border-[#3c4043] rounded-xl p-3 text-xs text-white h-24 resize-none" placeholder="Enter context for content generation..."></textarea>
        <button onclick="generateContent()" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold py-2 rounded-xl">Generate</button>
        <div id="cfOutput" class="bg-[#1e1f20] border border-[#3c4043] rounded-xl p-3 hidden"></div>
        <div id="cfStatus" class="text-xs"></div>
      </div>

      <!-- Design Panel -->
      <div id="panel-design" class="panel absolute inset-0 hidden flex-col p-4 overflow-y-auto gap-4">
        <div class="bg-[#1e1f20] rounded-xl p-4 border border-[#3c4043]"><svg width="100%" height="100" viewBox="0 0 400 80"><text x="20" y="30" fill="#a855f7" font-size="10">MISH MISH STAGE</text><text id="svgTitle" x="20" y="55" fill="#e3e3e3" font-size="11">No staged content</text></svg></div>
        <div><label class="text-[10px] font-bold text-gray-400">Staged Files</label><div id="stagedList" class="space-y-1 mt-1 max-h-40 overflow-y-auto"></div></div>
        <button onclick="refreshStaged()" class="bg-[#1e1f20] border border-[#3c4043] rounded-xl py-2 text-xs">Refresh</button>
      </div>

      <!-- Files Panel -->
      <div id="panel-files" class="panel absolute inset-0 hidden flex-col p-4 overflow-y-auto gap-4">
        <div class="grid grid-cols-2 gap-3">
          <button onclick="triggerFileUpload()" class="border border-dashed border-[#3c4043] hover:border-purple-500 rounded-xl py-3 flex items-center justify-center gap-2 text-xs"><i data-lucide="file" class="w-4 h-4"></i> Upload Files</button>
          <button onclick="triggerFolderUpload()" class="border border-dashed border-[#3c4043] hover:border-purple-500 rounded-xl py-3 flex items-center justify-center gap-2 text-xs"><i data-lucide="folder" class="w-4 h-4"></i> Upload Folder</button>
        </div>
        <input type="file" id="fileInput" multiple class="hidden" onchange="handleFilesUpload(this.files)"/>
        <input type="file" id="folderInput" webkitdirectory multiple class="hidden" onchange="handleFolderUpload(this.files)"/>
        <div><label class="text-[10px] font-bold text-gray-400">📁 Repository Assets</label><div id="repoFileList" class="space-y-1 mt-1 max-h-64 overflow-y-auto"></div></div>
        <div id="filesStatus" class="text-xs"></div>
      </div>
    </div>
  </div>

  <!-- FAIL-SAFE MODAL -->
  <div id="errorModal" class="fixed inset-0 hidden items-center justify-center z-50 modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="bg-[#1e1f20] border border-rose-500/40 rounded-2xl max-w-lg w-full mx-4 shadow-2xl">
      <div class="flex justify-between items-center p-4 border-b border-rose-500/20"><h3 class="text-sm font-bold text-rose-400 flex items-center gap-2"><i data-lucide="alert-triangle" class="w-4 h-4"></i>API Failure Report</h3><button onclick="closeModal()" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button></div>
      <div class="p-4 space-y-3 text-xs font-mono">
        <div><span class="text-gray-400">Status:</span> <span id="modalStatus" class="text-rose-300"></span></div>
        <div><span class="text-gray-400">Endpoint:</span> <span id="modalEndpoint" class="text-gray-200 break-all"></span></div>
        <div><span class="text-gray-400">Response Body:</span> <pre id="modalBody" class="bg-[#131314] p-2 rounded-lg text-gray-300 whitespace-pre-wrap overflow-auto max-h-60"></pre></div>
        <div><span class="text-gray-400">Error Code:</span> <span id="modalErrorCode" class="text-rose-300"></span></div>
      </div>
      <div class="p-3 border-t border-[#3c4043] flex justify-end"><button onclick="closeModal()" class="bg-rose-500/20 text-rose-300 px-4 py-1.5 rounded-lg text-xs">Dismiss</button></div>
    </div>
  </div>

  <script>
    // ---------- STATE ----------
    let GH_TOKEN = localStorage.getItem('mm_gh_token') || '';
    let GH_REPO = localStorage.getItem('mm_gh_repo') || '';
    let GEMINI_KEY = localStorage.getItem('mm_gemini_key') || '';
    let GEMINI_MODEL = localStorage.getItem('mm_gemini_model') || 'gemini-1.5-flash';
    let activeRole = 'hook';
    let chatHistory = [];
    let temp = 0.7, topP = 0.9, topK = 40;
    let systemPersona = "Hisham Al Ansari (ADHD Performance Director)";

    // Helper: safe lucide icon creation (checks if lucide is loaded)
    function safeCreateIcons() {
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        lucide.createIcons();
      }
    }

    // ---------- INIT ----------
    window.onload = () => {
      // Safely create icons if lucide is available
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
      
      document.getElementById('ghToken').value = GH_TOKEN;
      document.getElementById('ghRepo').value = GH_REPO;
      document.getElementById('geminiKey').value = GEMINI_KEY;
      document.getElementById('geminiModel').value = GEMINI_MODEL;
      document.getElementById('tempSlider').value = temp;
      document.getElementById('tempValue').innerText = temp;
      document.getElementById('topPSlider').value = topP;
      document.getElementById('topPValue').innerText = topP;
      document.getElementById('topKSlider').value = topK;
      document.getElementById('topKValue').innerText = topK;
      document.getElementById('personaPreset').value = systemPersona;

      // slider listeners
      document.getElementById('tempSlider').addEventListener('input', (e) => { temp = parseFloat(e.target.value); document.getElementById('tempValue').innerText = temp; });
      document.getElementById('topPSlider').addEventListener('input', (e) => { topP = parseFloat(e.target.value); document.getElementById('topPValue').innerText = topP; });
      document.getElementById('topKSlider').addEventListener('input', (e) => { topK = parseInt(e.target.value); document.getElementById('topKValue').innerText = topK; });
      document.getElementById('personaPreset').addEventListener('change', (e) => { systemPersona = e.target.value; });

      if (GH_TOKEN && GH_REPO && GEMINI_KEY) saveAndHandshake();
      loadChat();
      switchTab('showrunner');
    };

    // ---------- MODAL ----------
    function showFailModal(endpoint, status, body, errorCode) {
      document.getElementById('modalStatus').innerText = status;
      document.getElementById('modalEndpoint').innerText = endpoint;
      document.getElementById('modalBody').innerText = typeof body === 'object' ? JSON.stringify(body, null, 2) : String(body);
      document.getElementById('modalErrorCode').innerText = errorCode || 'N/A';
      document.getElementById('errorModal').classList.remove('hidden');
      document.getElementById('errorModal').classList.add('flex');
    }
    function closeModal() {
      document.getElementById('errorModal').classList.add('hidden');
      document.getElementById('errorModal').classList.remove('flex');
    }

    // ---------- GITHUB ----------
    async function ghFetch(path, opts = {}) {
      const url = 'https://api.github.com' + path;
      const res = await fetch(url, {
        ...opts,
        headers: { ...opts.headers, 'Authorization': `Bearer ${GH_TOKEN}`, 'Accept': 'application/vnd.github+json' }
      });
      let body;
      try { body = await res.json(); } catch(e) { body = { error: 'Invalid JSON response' }; }
      if (!res.ok) {
        showFailModal(url, res.status, body, body.message || 'GitHub error');
        throw new Error(`GitHub ${res.status}: ${body.message || 'Request failed'}`);
      }
      return body;
    }

    // ---------- GEMINI ----------
    async function callGemini(messages, systemInstruction = '') {
      if (!GEMINI_KEY) throw new Error('Gemini API key missing');
      const contents = messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.text }]
      }));
      const generationConfig = { temperature: temp, topP: topP, topK: topK };
      const payload = { contents, generationConfig };
      if (systemInstruction) payload.systemInstruction = { parts: [{ text: systemInstruction }] };

      const endpoints = [
        `https://generativelanguage.googleapis.com/v1/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`,
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`
      ];

      let lastError = null;
      for (const url of endpoints) {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        let data;
        try { data = await res.json(); } catch(e) { data = { error: 'Invalid JSON from Gemini' }; }

        if (res.ok) {
          return data.candidates[0].content.parts[0].text;
        }

        if (res.status === 404) {
          lastError = data;
          continue;
        }

        showFailModal(url, res.status, data, data.error?.code || data.error?.message);
        throw new Error(`Gemini API error: ${data.error?.message || res.status}`);
      }

      showFailModal(endpoints[1], 404, lastError, 'Model not found on any endpoint');
      throw new Error('Model not found on v1 or v1beta');
    }

    // ---------- HANDSHAKE ----------
    async function saveAndHandshake() {
      GH_TOKEN = document.getElementById('ghToken').value.trim();
      GH_REPO = document.getElementById('ghRepo').value.trim();
      GEMINI_KEY = document.getElementById('geminiKey').value.trim();
      GEMINI_MODEL = document.getElementById('geminiModel').value;
      localStorage.setItem('mm_gh_token', GH_TOKEN);
      localStorage.setItem('mm_gh_repo', GH_REPO);
      localStorage.setItem('mm_gemini_key', GEMINI_KEY);
      localStorage.setItem('mm_gemini_model', GEMINI_MODEL);

      // GitHub
      try {
        await ghFetch(`/repos/${GH_REPO}`);
        document.getElementById('githubStatusDot').className = 'w-2 h-2 rounded-full bg-emerald-500';
        document.getElementById('githubStatusLabel').textContent = GH_REPO;
      } catch(e) {
        document.getElementById('githubStatusDot').className = 'w-2 h-2 rounded-full bg-rose-500';
        document.getElementById('githubStatusLabel').textContent = 'Failed';
      }

      // Gemini
      try {
        await callGemini([{ role: 'user', text: 'ping' }], 'Respond with ok');
        document.getElementById('apiStatusDot').className = 'w-2 h-2 rounded-full bg-emerald-500';
        document.getElementById('apiStatusLabel').textContent = 'Active';
      } catch(e) {
        document.getElementById('apiStatusDot').className = 'w-2 h-2 rounded-full bg-rose-500';
        document.getElementById('apiStatusLabel').textContent = 'Error';
      }
    }

    // ---------- SHOWRUNNER ----------
    async function sendShowrunner() {
      const input = document.getElementById('srInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      chatHistory.push({ role: 'user', text });
      renderChat();
      try {
        const persona = document.getElementById('personaPreset').value;
        const reply = await callGemini(chatHistory, `You are ${persona}. Keep answers concise and strategic.`);
        chatHistory.push({ role: 'assistant', text: reply });
        renderChat();
        saveChat();
      } catch(e) {
        chatHistory.push({ role: 'assistant', text: `Error: ${e.message}` });
        renderChat();
      }
    }

    function renderChat() {
      const container = document.getElementById('srChat');
      container.innerHTML = chatHistory.map(m =>
        `<div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
          <div class="max-w-[80%] p-2 rounded-xl text-xs ${m.role === 'user' ? 'bg-[#2f3032] text-white' : 'bg-[#1e1f20] border border-[#3c4043]'}">
            ${escapeHtml(m.text)}
          </div>
        </div>`
      ).join('');
      container.scrollTop = container.scrollHeight;
    }

    function loadChat() {
      chatHistory = [{ role: 'assistant', text: 'Showrunner online. Configured with persona sliders.' }];
      renderChat();
    }
    function saveChat() { /* placeholder */ }

    // ---------- CONTENT ----------
    function setRole(role, btn) {
      activeRole = role;
      document.getElementById('creativeRoleIndicator').innerText = role.toUpperCase();
      document.querySelectorAll('.role-btn').forEach(b => b.className = 'role-btn text-[10px] font-bold px-3 py-1.5 rounded-lg border border-[#3c4043] text-gray-400');
      btn.className = 'role-btn text-[10px] font-bold px-3 py-1.5 rounded-lg bg-purple-500/20 text-purple-300';
    }

    async function generateContent() {
      const prompt = document.getElementById('cfInput').value;
      if (!prompt) return;
      const statusDiv = document.getElementById('cfStatus');
      statusDiv.innerText = 'Generating...';
      try {
        const system = `You are a ${activeRole.toUpperCase()} Architect. Produce short, punchy copy.`;
        const result = await callGemini([{ role: 'user', text: prompt }], system);
        const outDiv = document.getElementById('cfOutput');
        window._lastGeneratedContent = result;
        outDiv.innerHTML = `<div class="text-gray-200 whitespace-pre-wrap">${escapeHtml(result)}</div><button onclick="stageContent(window._lastGeneratedContent)" class="mt-2 bg-purple-600 text-white text-[10px] px-3 py-1 rounded">Stage this</button>`;
        outDiv.classList.remove('hidden');
        statusDiv.innerText = '';
      } catch(e) {
        statusDiv.innerText = `Error: ${e.message}`;
      }
    }

    async function stageContent(content) {
      try {
        const filename = `staging_${activeRole}_${Date.now()}.json`;
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify({ role: activeRole, content }))));
        await ghFetch(`/repos/${GH_REPO}/contents/mishstate/${filename}`, {
          method: 'PUT',
          body: JSON.stringify({ message: 'Stage content', content: encoded })
        });
        document.getElementById('cfStatus').innerText = 'Staged successfully!';
        refreshStaged();
      } catch(e) {
        document.getElementById('cfStatus').innerText = 'Stage failed: ' + e.message;
      }
    }

    // ---------- DESIGN / STAGED FILES ----------
    async function refreshStaged() {
      const container = document.getElementById('stagedList');
      try {
        const data = await ghFetch(`/repos/${GH_REPO}/contents/mishstate`);
        const staged = Array.isArray(data) ? data.filter(f => f.name.startsWith('staging_')) : [];
        if (!staged.length) { container.innerHTML = '<div class="text-xs text-gray-500">No staged files</div>'; return; }
        container.innerHTML = staged.map(f =>
          `<div class="flex justify-between items-center p-2 bg-[#131314] rounded-lg text-xs">
            <span class="truncate">${f.name}</span>
            <button onclick="previewStaged('${f.name}')" class="text-purple-400">Preview</button>
          </div>`
        ).join('');
      } catch(e) {
        container.innerHTML = '<div class="text-xs text-rose-400">Failed to load</div>';
      }
    }

    async function previewStaged(filename) {
      try {
        const file = await ghFetch(`/repos/${GH_REPO}/contents/mishstate/${filename}`);
        const content = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\s/g, '')))));
        document.getElementById('svgTitle').innerText = content.content.substring(0, 50);
      } catch(e) {
        document.getElementById('svgTitle').innerText = 'Preview error';
      }
    }

    // ---------- FILE UPLOAD ----------
    function triggerFileUpload() { document.getElementById('fileInput').click(); }
    function triggerFolderUpload() { document.getElementById('folderInput').click(); }

    async function handleFilesUpload(files) {
      document.getElementById('filesStatus').innerText = 'Uploading...';
      for (let file of files) await uploadFileToRepo(file, 'uploads/');
      document.getElementById('filesStatus').innerText = 'Upload complete.';
      refreshFileList();
    }

    async function handleFolderUpload(files) {
      document.getElementById('filesStatus').innerText = 'Uploading folder...';
      for (let file of files) {
        const relativePath = file.webkitRelativePath;
        await uploadFileToRepo(file, relativePath.substring(0, relativePath.lastIndexOf('/') + 1));
      }
      document.getElementById('filesStatus').innerText = 'Folder upload complete.';
      refreshFileList();
    }

    async function uploadFileToRepo(file, remoteFolder) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async () => {
          const base64 = reader.result.split(',')[1];
          const remotePath = `${remoteFolder}${file.name}`;
          try {
            let sha;
            try {
              const existing = await ghFetch(`/repos/${GH_REPO}/contents/${remotePath}`);
              sha = existing.sha;
            } catch(e) { /* file doesn't exist yet */ }

            await ghFetch(`/repos/${GH_REPO}/contents/${remotePath}`, {
              method: 'PUT',
              body: JSON.stringify({ message: `Upload ${file.name}`, content: base64, ...(sha ? { sha } : {}) })
            });
            resolve();
          } catch(e) { reject(e); }
        };
        reader.onerror = () => reject(new Error('File read failed'));
        reader.readAsDataURL(file);
      });
    }

    async function refreshFileList() {
      const container = document.getElementById('repoFileList');
      try {
        const data = await ghFetch(`/repos/${GH_REPO}/contents/uploads`);
        if (!Array.isArray(data)) { container.innerHTML = '<div class="text-xs text-gray-500">No files yet</div>'; return; }
        container.innerHTML = data.map(f =>
          `<div class="p-2 bg-[#131314] rounded-lg text-xs font-mono truncate">${f.name}</div>`
        ).join('');
        document.getElementById('filesStatus').innerText = 'Sync complete.';
      } catch(e) {
        container.innerHTML = '<div class="text-xs text-gray-500">No files yet</div>';
      }
    }

    // ---------- TABS ----------
    function switchTab(tabName) {
      document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
      document.getElementById(`panel-${tabName}`).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('border-purple-500', 'text-white'));
      const activeBtn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
      if (activeBtn) activeBtn.classList.add('border-purple-500', 'text-white');
      if (tabName === 'design') refreshStaged();
      if (tabName === 'files') refreshFileList();
      // safe icon refresh
      safeCreateIcons();
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, function(m) {
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m];
      });
    }
  </script>
</body>
</html>
